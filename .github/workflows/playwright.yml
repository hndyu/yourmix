name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Apply D1 migrations
      if: ${{ secrets.CF_API_TOKEN && secrets.CF_ACCOUNT_ID }}
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      run: |
        echo "Applying D1 SQL migrations to yourmix-db"
        # Ensure wrangler is available; use local npx if installed, otherwise install CLI
        command -v wrangler >/dev/null 2>&1 || npm i -g wrangler@latest
        for f in ./drizzle/*.sql; do
          echo "--- Applying $f ---"
          npx wrangler d1 execute yourmix-db --remote --file="$f"
        done
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
